<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>fGPU Sessions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* Stage 5-B + Stage 10: 의도적으로 단순한 스타일. 캡스톤 시연용 최소 UI. */
    :root { color-scheme: light dark; }
    body {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      max-width: 1200px;
      margin: 1.5rem auto;
      padding: 0 1rem;
      line-height: 1.45;
    }
    h1 { margin: 0 0 0.25rem 0; }
    h2 { margin-top: 2rem; }
    .muted { opacity: 0.7; font-size: 0.9em; }
    .row { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: end; }
    label { display: flex; flex-direction: column; font-size: 0.85em; }
    .inline-label { flex-direction: row; align-items: center; gap: 0.3rem; }
    input, button, select, textarea {
      font: inherit;
      padding: 0.35rem 0.5rem;
    }
    input[type=number] { width: 6rem; }
    input.image, input.command { min-width: 22rem; }
    fieldset { border: 1px solid #8884; padding: 0.5rem 0.75rem; margin: 0; }
    legend { font-size: 0.85em; opacity: 0.7; padding: 0 0.3rem; }
    table {
      border-collapse: collapse; width: 100%; margin-top: 0.75rem;
      font-size: 0.9em;
    }
    th, td { border: 1px solid #8884; padding: 0.35rem 0.5rem; text-align: left; vertical-align: top; }
    tbody tr { cursor: pointer; }
    tbody tr:hover { background: #8881; }
    tbody tr.selected { background: #4a90e22a; }
    .status-running  { color: #2a7;   }
    .status-exited   { color: #888;   }
    .status-created  { color: #888;   }
    .status-removed  { color: #c33;   }
    .exit-zero    { color: #2a7; }
    .exit-nonzero { color: #c33; }
    .mode-jupyter { color: #4a90e2; font-weight: 600; }
    .mode-batch   { color: #888; }
    a.jupyter-link {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      background: #4a90e2;
      color: white;
      text-decoration: none;
      border-radius: 3px;
      font-size: 0.85em;
    }
    a.jupyter-link:hover { background: #357abd; }
    pre.logs {
      background: #0001;
      padding: 0.6rem;
      max-height: 26rem;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .err { color: #c33; }
    button.danger { color: #c33; }
    .toolbar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 0.5rem 0; }
    .hidden-when-jupyter[data-jupyter="1"] { display: none; }
  </style>
</head>
<body>
  <h1>fGPU Sessions</h1>
  <p class="muted" id="health-line">healthz …</p>

  <div class="toolbar">
    <label>API token (auth on 일 때만 필요)
      <input id="token-input" type="password" class="image"
             placeholder="비어있으면 인증 비활성 가정" />
    </label>
    <button id="token-save">save</button>
    <span class="muted" id="token-status"></span>
  </div>

  <h2>Create</h2>
  <form id="create-form">
    <fieldset>
      <legend>mode</legend>
      <div class="row">
        <label class="inline-label">
          <input type="radio" name="mode" value="batch" checked />
          <span><strong>batch</strong> — 명령 1회 실행 후 종료 (테스트/벤치마크)</span>
        </label>
        <label class="inline-label">
          <input type="radio" name="mode" value="jupyter" />
          <span class="mode-jupyter"><strong>jupyter</strong> — Jupyter Lab 띄움 (인터랙티브 코딩)</span>
        </label>
      </div>
    </fieldset>

    <div class="row" style="margin-top:0.5rem">
      <label>ratio (0&lt;r≤1)
        <input name="ratio" type="number" step="0.05" min="0.05" max="1" value="0.4" required />
      </label>
      <label>gpu_index (멀티-GPU, 빈 값 = 모든 GPU)
        <input name="gpu_index" type="number" min="0" step="1" placeholder="" />
      </label>
      <label>compute_ratio (Stage 12 throttle, 빈 값 = off)
        <input name="compute_ratio" type="number" step="0.05" min="0.05" max="1" placeholder="" />
      </label>
      <label>image
        <input name="image" id="image-input" class="image" value="fgpu-runtime-pytorch:stage4" />
      </label>
      <label class="cmd-label">command (whitespace-split, empty = image default)
        <input name="command" id="command-input" class="command" placeholder="python3 /opt/fgpu/test_hold.py" />
      </label>
      <button type="submit">create</button>
    </div>
    <div class="row" style="margin-top:0.4rem">
      <label class="inline-label">
        <input type="checkbox" name="force" id="force-input" />
        <span>force (admission 우회 — sum(ratios) &gt; 1 oversubscription 데모용)</span>
      </label>
    </div>
    <p id="capacity-line" class="muted" style="margin-top:0.4rem"></p>
    <p id="mode-hint" class="muted" style="margin-top:0.4rem"></p>
    <p id="create-err" class="err" hidden></p>
  </form>

  <h2>Sessions <span class="muted" id="poll-info">(auto-refresh 3s)</span></h2>
  <div class="toolbar">
    <button id="refresh-btn">refresh</button>
    <span class="muted" id="last-refresh"></span>
  </div>
  <table>
    <thead>
      <tr>
        <th>id</th><th>mode</th><th>image</th><th>ratio</th><th>gpu</th>
        <th>status</th><th>exit</th><th>jupyter</th><th>created</th><th>actions</th>
      </tr>
    </thead>
    <tbody id="sessions-tbody"><tr><td colspan="10" class="muted">…</td></tr></tbody>
  </table>

  <h2>Logs <span class="muted" id="logs-of"></span></h2>
  <div class="toolbar">
    <button id="logs-refresh-btn" disabled>refresh logs</button>
  </div>
  <pre class="logs" id="logs-pane">(세션을 클릭하면 tail 로그를 표시)</pre>

<script>
"use strict";

const $ = (sel) => document.querySelector(sel);
let selectedSid = null;

// ---- token (Stage 9 minimal — auth on 일 때 사용) -------------------------
const TOKEN_KEY = 'fgpu_api_token';
function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
function setToken(t) {
  if (t) localStorage.setItem(TOKEN_KEY, t);
  else   localStorage.removeItem(TOKEN_KEY);
}
function authHeaders() {
  const t = getToken();
  return t ? { 'Authorization': `Bearer ${t}` } : {};
}

// ---- helpers --------------------------------------------------------------
async function jget(url) {
  const r = await fetch(url, { headers: authHeaders() });
  if (!r.ok) throw new Error(`${url} → ${r.status}`);
  return r.json();
}
async function jpost(url, body) {
  const r = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', ...authHeaders() },
    body: body == null ? null : JSON.stringify(body),
  });
  if (!r.ok) {
    const txt = await r.text();
    throw new Error(`${url} → ${r.status}: ${txt}`);
  }
  return r.json();
}
async function jdelete(url) {
  const r = await fetch(url, { method: 'DELETE', headers: authHeaders() });
  if (!r.ok) throw new Error(`${url} → ${r.status}`);
  return r.json();
}
const fmtTime = (iso) => {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString();
};
const escapeHtml = (s) =>
  String(s).replace(/[&<>"']/g, (c) => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));

// ---- healthz --------------------------------------------------------------
async function refreshHealth() {
  try {
    const h = await jget('/healthz');
    const auth = h.auth_enabled ? ' [auth ON]' : ' [auth off]';
    $('#health-line').textContent =
      `healthz: ok=${h.ok}  runtime_image=${h.runtime_image}  ` +
      `host_hook_exists=${h.host_hook_exists}` + auth;
    const have = !!getToken();
    if (h.auth_enabled && !have) {
      $('#token-status').textContent = '⚠ auth ON 인데 토큰 미저장 → 401 발생';
      $('#token-status').className = 'err';
    } else if (h.auth_enabled && have) {
      $('#token-status').textContent = '✓ 토큰 저장됨, 모든 API 호출에 첨부';
      $('#token-status').className = 'muted';
    } else if (!h.auth_enabled && have) {
      $('#token-status').textContent = '(auth off — 토큰은 무시됨)';
      $('#token-status').className = 'muted';
    } else {
      $('#token-status').textContent = '';
    }
  } catch (e) {
    $('#health-line').innerHTML = `<span class="err">healthz failed: ${escapeHtml(e.message)}</span>`;
  }
}

// ---- mode toggle (batch / jupyter) ---------------------------------------
function applyModeUI() {
  const mode = (new FormData($('#create-form'))).get('mode') || 'batch';
  const cmdInput = $('#command-input');
  const cmdLabel = document.querySelector('label.cmd-label');
  const imgInput = $('#image-input');
  if (mode === 'jupyter') {
    cmdInput.value = '';
    cmdInput.disabled = true;
    cmdLabel.style.opacity = '0.4';
    cmdInput.placeholder = '(jupyter 모드는 자동: jupyter lab)';
    if (imgInput.value === 'fgpu-runtime:stage2') {
      // jupyter 는 PyTorch 이미지 필요.
      imgInput.value = 'fgpu-runtime-pytorch:stage4';
    }
    $('#mode-hint').textContent =
      'jupyter 모드: 이미지에 jupyterlab 이 깔려 있어야 함 (fgpu-runtime-pytorch:stage4 권장). ' +
      '컨테이너 안 /workspace 가 호스트의 data/sessions/<id>/ 로 마운트됨.';
  } else {
    cmdInput.disabled = false;
    cmdLabel.style.opacity = '1';
    cmdInput.placeholder = 'python3 /opt/fgpu/test_hold.py';
    $('#mode-hint').textContent = '';
  }
}
document.querySelectorAll('input[name="mode"]').forEach((el) =>
  el.addEventListener('change', applyModeUI));

// ---- admission capacity (Stage 11) ---------------------------------------
async function refreshCapacity() {
  try {
    const r = await jget('/sessions/admission');
    const entries = Object.entries(r.by_gpu || {});
    if (entries.length === 0) {
      $('#capacity-line').textContent = 'capacity: 0.000/1.000 used (no active sessions)';
      $('#capacity-line').className = 'muted';
      return;
    }
    const parts = entries.map(([gpu, info]) => {
      const overcap = info.ratio_used > 1.0001;
      return `GPU ${gpu}: ${info.ratio_used.toFixed(3)}/1.000 ` +
             `(${info.active_sessions} session${info.active_sessions===1?'':'s'})` +
             (overcap ? ' ⚠ oversubscribed' : '');
    });
    $('#capacity-line').textContent = 'capacity: ' + parts.join('   ');
    const anyOver = entries.some(([_, i]) => i.ratio_used > 1.0001);
    $('#capacity-line').className = anyOver ? 'err' : 'muted';
  } catch (e) {
    $('#capacity-line').textContent = `capacity check failed: ${e.message}`;
    $('#capacity-line').className = 'err';
  }
}

// ---- sessions list --------------------------------------------------------
function renderRow(s) {
  const tr = document.createElement('tr');
  tr.dataset.sid = s.id;
  if (s.id === selectedSid) tr.classList.add('selected');
  const exitClass = s.exit_code === 0 ? 'exit-zero' :
                    (s.exit_code != null ? 'exit-nonzero' : '');
  const exitTxt = s.exit_code == null ? '' : s.exit_code;
  const gpuTxt = (s.gpu_index == null) ? 'all' : s.gpu_index;
  const mode = s.mode || 'batch';
  // jupyter URL 은 백엔드가 FGPU_PUBLIC_HOST 기준으로 만들어 보내지만,
  // 사용자가 UI 에 접속한 호스트명 (location.hostname) 으로 다시 조립하면
  // 로컬/원격 양쪽 다 자연스럽게 작동.
  let jupyterCell = '';
  if (mode === 'jupyter' && s.host_port && s.jupyter_token) {
    const url = `${location.protocol}//${location.hostname}:${s.host_port}` +
                `/lab?token=${encodeURIComponent(s.jupyter_token)}`;
    if (s.status === 'running') {
      jupyterCell =
        `<a class="jupyter-link" href="${escapeHtml(url)}" ` +
        `target="_blank" rel="noopener" data-noselect="1">open ↗</a>` +
        `<div class="muted" style="margin-top:0.2rem">:${escapeHtml(String(s.host_port))}</div>`;
    } else {
      jupyterCell = `<span class="muted">${escapeHtml(s.status)}</span>`;
    }
  }
  tr.innerHTML = `
    <td><code>${escapeHtml(s.id)}</code></td>
    <td class="mode-${escapeHtml(mode)}">${escapeHtml(mode)}</td>
    <td>${escapeHtml(s.image)}</td>
    <td>${s.ratio}</td>
    <td>${escapeHtml(String(gpuTxt))}</td>
    <td class="status-${escapeHtml(s.status)}">${escapeHtml(s.status)}</td>
    <td class="${exitClass}">${escapeHtml(String(exitTxt))}</td>
    <td>${jupyterCell}</td>
    <td>${escapeHtml(fmtTime(s.created_at))}</td>
    <td>
      <button data-action="stop"   data-sid="${escapeHtml(s.id)}">stop</button>
      <button data-action="delete" data-sid="${escapeHtml(s.id)}" class="danger">delete</button>
    </td>
  `;
  return tr;
}
async function refreshSessions() {
  let sessions;
  try {
    sessions = await jget('/sessions');
  } catch (e) {
    $('#sessions-tbody').innerHTML =
      `<tr><td colspan="10" class="err">${escapeHtml(e.message)}</td></tr>`;
    return;
  }
  const tbody = $('#sessions-tbody');
  tbody.innerHTML = '';
  if (sessions.length === 0) {
    tbody.innerHTML = `<tr><td colspan="10" class="muted">(no sessions)</td></tr>`;
  } else {
    sessions.sort((a, b) => (a.created_at < b.created_at ? 1 : -1));
    for (const s of sessions) tbody.appendChild(renderRow(s));
  }
  $('#last-refresh').textContent = `updated ${new Date().toLocaleTimeString()}`;
}

// ---- logs -----------------------------------------------------------------
async function refreshLogs() {
  if (!selectedSid) return;
  try {
    const r = await jget(`/sessions/${encodeURIComponent(selectedSid)}/logs`);
    $('#logs-pane').textContent = r.logs || '(empty)';
  } catch (e) {
    $('#logs-pane').textContent = `logs failed: ${e.message}`;
  }
}
function selectSession(sid) {
  selectedSid = sid;
  $('#logs-of').textContent = sid ? `— ${sid}` : '';
  $('#logs-refresh-btn').disabled = !sid;
  refreshSessions();
  refreshLogs();
}

// ---- create ---------------------------------------------------------------
$('#create-form').addEventListener('submit', async (ev) => {
  ev.preventDefault();
  $('#create-err').hidden = true;
  const fd = new FormData(ev.target);
  const ratio = Number(fd.get('ratio'));
  const mode = String(fd.get('mode') || 'batch');
  const image = String(fd.get('image') || '').trim();
  const cmdStr = String(fd.get('command') || '').trim();
  const gpuStr = String(fd.get('gpu_index') || '').trim();
  const crStr = String(fd.get('compute_ratio') || '').trim();
  const force = $('#force-input').checked;
  const payload = { ratio, mode };
  if (image) payload.image = image;
  if (mode !== 'jupyter' && cmdStr) payload.command = cmdStr.split(/\s+/);
  if (gpuStr !== '') payload.gpu_index = Number(gpuStr);
  if (crStr !== '') payload.compute_ratio = Number(crStr);
  if (force) payload.force = true;
  try {
    const created = await jpost('/sessions', payload);
    selectSession(created.id);
    refreshCapacity();
    // jupyter 모드면 새 탭으로 즉시 열기 (사용자가 popup 차단 풀어둬야 함).
    // location.hostname 기반으로 재조립 — 백엔드가 보낸 jupyter_url 은
    // FGPU_PUBLIC_HOST=localhost 기본이라 원격 접속 시 안 맞을 수 있음.
    if (created.mode === 'jupyter' && created.host_port && created.jupyter_token) {
      const url = `${location.protocol}//${location.hostname}:${created.host_port}` +
                  `/lab?token=${encodeURIComponent(created.jupyter_token)}`;
      window.open(url, '_blank', 'noopener');
    }
  } catch (e) {
    $('#create-err').hidden = false;
    // Stage 11: admission 거부 (409) 는 친절한 메시지 + force 안내.
    const m = e.message.match(/→ 409:\s*(.+)$/);
    if (m) {
      try {
        const detail = JSON.parse(m[1]).detail;
        if (detail && detail.error === 'admission_denied') {
          $('#create-err').innerHTML =
            `<strong>admission denied</strong> — ` +
            `requested ${detail.requested_ratio.toFixed(3)}, ` +
            `currently used ${detail.currently_used.toFixed(3)}, ` +
            `available ${detail.available.toFixed(3)} on ` +
            `${detail.gpu_index === null ? 'all GPUs' : 'GPU ' + detail.gpu_index} ` +
            `(${detail.active_sessions} active session${detail.active_sessions===1?'':'s'}). ` +
            `<br/>Tip: 다른 세션을 먼저 stop / delete 하거나, ` +
            `<strong>force 체크박스</strong>를 켜고 다시 create.`;
          return;
        }
      } catch (_) { /* fallthrough */ }
    }
    $('#create-err').textContent = e.message;
  }
});

// ---- token toolbar -------------------------------------------------------
$('#token-input').value = getToken();
$('#token-save').addEventListener('click', () => {
  setToken($('#token-input').value.trim());
  refreshHealth();
  refreshSessions();
});

// ---- table delegation: click row → select; click action button → act ------
$('#sessions-tbody').addEventListener('click', async (ev) => {
  // jupyter 링크 클릭은 row select 로 안 잡고 통과.
  if (ev.target.closest('a.jupyter-link')) return;
  const btn = ev.target.closest('button[data-action]');
  if (btn) {
    ev.stopPropagation();
    const sid = btn.dataset.sid;
    const action = btn.dataset.action;
    btn.disabled = true;
    try {
      if (action === 'stop') {
        await jpost(`/sessions/${encodeURIComponent(sid)}/stop`);
      } else if (action === 'delete') {
        const purge = confirm(
          'workspace 디렉토리도 삭제할까? (jupyter 노트북 영구 손실)\n\n' +
          'OK = 컨테이너 + 노트북 삭제\n' +
          'Cancel = 컨테이너만 삭제, 노트북 보존'
        );
        const url = `/sessions/${encodeURIComponent(sid)}` +
                    (purge ? '?purge_workspace=true' : '');
        await jdelete(url);
        if (sid === selectedSid) selectSession(null);
      }
    } catch (e) {
      alert(e.message);
    }
    await refreshSessions();
    await refreshCapacity();
    return;
  }
  const tr = ev.target.closest('tr[data-sid]');
  if (tr) selectSession(tr.dataset.sid);
});

$('#refresh-btn').addEventListener('click', refreshSessions);
$('#logs-refresh-btn').addEventListener('click', refreshLogs);

// ---- init + polling -------------------------------------------------------
applyModeUI();
refreshHealth();
refreshSessions();
refreshCapacity();
setInterval(refreshSessions, 3000);
setInterval(refreshCapacity, 3000);
setInterval(() => { if (selectedSid) refreshLogs(); }, 3000);
</script>
</body>
</html>
